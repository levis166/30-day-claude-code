name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bike-maintenance-app/backend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: bike-maintenance-app/backend
      - name: Deploy to Railway
        # Add RAILWAY_TOKEN to GitHub repo secrets before enabling
        # run: npx @railway/cli deploy --service bike-maintenance-backend
        # env:
        #   RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: echo "Railway deploy ready — add RAILWAY_TOKEN secret to enable"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bike-maintenance-app/frontend/package-lock.json
      - name: Install
        run: npm ci
        working-directory: bike-maintenance-app/frontend
      - name: Build
        run: npm run build
        working-directory: bike-maintenance-app/frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
      - name: Deploy to Vercel
        # Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to secrets before enabling
        # uses: amondnet/vercel-action@v25
        # with:
        #   vercel-token: ${{ secrets.VERCEL_TOKEN }}
        #   vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        #   vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        #   working-directory: bike-maintenance-app/frontend
        run: echo "Vercel deploy ready — add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID secrets to enable"
